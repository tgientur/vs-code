// 转换时间戳为日期字符串
function formatStockData(data) {
    return data.map(item => {
        const date = new Date(item.timestamp);
        return {
            time: date.toISOString().split('T')[0],
            open: item.open,
            high: item.high,
            low: item.low,
            close: item.close,
            volume: item.volume
        };
    });
}

// 根据时间周期筛选数据
function filterDataByTimeframe(data, timeframe) {
    const now = new Date();
    let days = 365; // 默认1年
    
    switch(timeframe) {
        case '1M': days = 30; break;
        case '3M': days = 90; break;
        case '6M': days = 180; break;
        default: days = 365;
    }
    
    const cutoffDate = new Date(now);
    cutoffDate.setDate(cutoffDate.getDate() - days);
    
    return data.filter(item => {
        const itemDate = new Date(item.timestamp);
        return itemDate >= cutoffDate;
    });
}

    height: document.getElementById('chart').clientHeight,
    layout: {

        textColor: '#D9D9D9',
    },
    grid: {
        vertLines: { color: 'rgba(255, 255, 255, 0.1)' },
        horzLines: { color: 'rgba(255, 255, 255, 0.1)' },
    },
    crosshair: {
        mode: LightweightCharts.CrosshairMode.Normal,
    },
    rightPriceScale: {
        borderColor: 'rgba(255, 255, 255, 0.1)',
    },
    timeScale: {
        borderColor: 'rgba(255, 255, 255, 0.1)',
        timeVisible: true,
        secondsVisible: false,
    },
});

    upColor: '#00ff88',
    downColor: '#ff5555',
    borderVisible: false,
    wickUpColor: '#00ff88',
    wickDownColor: '#ff5555',
});

// 创建折线图系列

    lineWidth: 2,
});

// 创建面积图系列

    bottomColor: 'rgba(0, 212, 255, 0.05)',
    lineColor: '#00d4ff',
    lineWidth: 2,
});

    color: 'rgba(0, 212, 255, 0.5)',
    priceFormat: {
        type: 'volume',
    },
    priceScaleId: '',
});

volumeSeries.priceScale().applyOptions({
    scaleMargins: {
        top: 0.8,
        bottom: 0,
    },
});

    time: d.time,
    open: d.open,
    high: d.high,
    low: d.low,
    close: d.close,
})));

// 设置折线图数据（收盘价）
lineSeries.setData(currentData.map(d => ({
    time: d.time,
    value: d.close,
})));

// 设置面积图数据（收盘价）
areaSeries.setData(currentData.map(d => ({
    time: d.time,
    value: d.close,
})));

// 设置成交量数据
volumeSeries.setData(currentData.map(d => ({
    time: d.time,
    value: d.volume,
    color: d.close >= d.open ? 'rgba(0, 255, 136, 0.5)' : 'rgba(255, 85, 85, 0.5)',
})));

// 更新股票信息显示
function updateStockInfo(latestData) {
    if (!latestData) return;
    
    const date = new Date(latestData.time);
    document.getElementById('latest-date').textContent = `日期: ${date.toLocaleDateString('zh-CN')}`;
    document.getElementById('open').textContent = latestData.open.toFixed(2);
    document.getElementById('close').textContent = latestData.close.toFixed(2);
    document.getElementById('high').textContent = latestData.high.toFixed(2);
    document.getElementById('low').textContent = latestData.low.toFixed(2);
    
    // 成交量转换为万手
    const volumeInWan = (latestData.volume / 10000).toFixed(1);
    document.getElementById('volume').textContent = `${volumeInWan}万手`;
}

// 初始更新
updateStockInfo(currentData[currentData.length - 1]);

// 当前显示的系列

lineSeries.applyOptions({ visible: false });
areaSeries.applyOptions({ visible: false });
volumeSeries.applyOptions({ visible: true });

// 图表类型切换

    setActiveButton('candleBtn');

    areaSeries.applyOptions({ visible: false });
    activeSeries = candleSeries;
});

});

document.getElementById('areaBtn').addEventListener('click', () => {

    lineSeries.applyOptions({ visible: false });
    areaSeries.applyOptions({ visible: true });
    activeSeries = areaSeries;
});

document.getElementById('volumeBtn').addEventListener('click', function() {
    const isVisible = volumeSeries.options().visible;
    volumeSeries.applyOptions({ visible: !isVisible });
    this.classList.toggle('active', !isVisible);
});

// 时间周期切换
document.querySelectorAll('.timeframe-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        
        const timeframe = this.dataset.timeframe;
        let filteredData;
        
        if (timeframe === '1Y') {
            // 显示所有数据（1年）
            filteredData = formattedData;
        } else {
            // 根据时间周期筛选数据
            filteredData = filterDataByTimeframe(realStockData, timeframe);
            filteredData = formatStockData(filteredData);
        }
        
        // 更新所有系列数据
        candleSeries.setData(filteredData.map(d => ({
            time: d.time,
            open: d.open,
            high: d.high,
            low: d.low,
            close: d.close,
        })));
        
        lineSeries.setData(filteredData.map(d => ({
            time: d.time,
            value: d.close,
        })));
        
        areaSeries.setData(filteredData.map(d => ({
            time: d.time,
            value: d.close,
        })));
        
        volumeSeries.setData(filteredData.map(d => ({
            time: d.time,
            value: d.volume,
            color: d.close >= d.open ? 'rgba(0, 255, 136, 0.5)' : 'rgba(255, 85, 85, 0.5)',
        })));
        
        currentData = filteredData;
        updateStockInfo(currentData[currentData.length - 1]);
        chart.timeScale().fitContent();
    });
});

// 设置活动按钮
function setActiveButton(buttonId) {
    document.querySelectorAll('.controls button:not(.timeframe-btn)').forEach(btn => {
        btn.classList.remove('active');
    });
    document.getElementById(buttonId).classList.add('active');
}

// 窗口大小调整时重新调整图表大小
window.addEventListener('resize', () => {
    chart.applyOptions({
        width: document.getElementById('chart').clientWidth,
        height: document.getElementById('chart').clientHeight
    });
});

// 添加鼠标悬停效果
chart.subscribeCrosshairMove(param => {
    if (param.time) {
        const data = param.seriesData.get(activeSeries);
        if (data) {
            updateStockInfo(data);
        }
    }
});

// 初始化完成
console.log('厦门钨业(600549) K线图已初始化完成！');
console.log('使用真实股票数据，数据点数量：', currentData.length);
chart.timeScale().fitContent();
