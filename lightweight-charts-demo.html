        function formatStockData(data) {
            return data.map(item => {

                    time: Math.floor(item.timestamp / 1000), // 用秒级时间戳，适配lightweight-charts
                    open: item.open,
                    high: item.high,
                    low: item.low,
                    close: item.close,
                    volume: item.volume
                };
            });
        }
        
        // 根据时间周期筛选数据
        function filterDataByTimeframe(data, timeframe) {
            const now = new Date();
            let days = 30; // 默认1个月
            
            switch(timeframe) {
                case '1D': days = 1; break;
                case '1W': days = 7; break;
                case '3M': days = 90; break;
                case '1Y': days = 365; break;
                default: days = 30;
            }
            
            const cutoffDate = new Date(now);
            cutoffDate.setDate(cutoffDate.getDate() - days);
            
            return data.filter(item => {
                const itemDate = new Date(item.timestamp);
                return itemDate >= cutoffDate;
            });
        }

        console.log('初始K线数据:', currentData);
        if (!currentData || currentData.length === 0) {
            console.error('K线数据为空，无法渲染图表');
        }
        candleSeries.setData(currentData.map(d => ({
            time: d.time,
            open: d.open,
            high: d.high,
            low: d.low,
            close: d.close,
        })));
        // 设置折线图数据（收盘价）
        lineSeries.setData(currentData.map(d => ({
            time: d.time,
            value: d.close,
        })));
        // 设置面积图数据（收盘价）
        areaSeries.setData(currentData.map(d => ({
            time: d.time,
            value: d.close,
        })));
        // 设置成交量数据
        volumeSeries.setData(currentData.map(d => ({
            time: d.time,
            value: d.volume,
            color: d.close >= d.open ? 'rgba(0, 255, 136, 0.5)' : 'rgba(255, 85, 85, 0.5)',
        })));
        // 再次自动适配内容
        setTimeout(() => { chart.timeScale().fitContent(); }, 200);
        
        // 更新股票信息显示
        function updateStockInfo(latestData) {
            if (!latestData) return;
            
            // 更新页面上的股票信息
            document.querySelector('.info-card:nth-child(1) .value').textContent = `¥${latestData.close.toFixed(2)}`;
            
            // 计算涨跌幅（与前一天比较）
            const prevIndex = currentData.length > 1 ? currentData.length - 2 : 0;
            const prevClose = currentData[prevIndex]?.close || latestData.close;
            const changePercent = ((latestData.close - prevClose) / prevClose * 100).toFixed(2);
            
            const changeElement = document.querySelector('.info-card:nth-child(2) .value');
            changeElement.textContent = `${changePercent >= 0 ? '+' : ''}${changePercent}%`;
            changeElement.className = changePercent >= 0 ? 'value positive' : 'value negative';
            
            // 更新成交量（转换为万手）
            const volumeInWan = (latestData.volume / 10000).toFixed(1);
            document.querySelector('.info-card:nth-child(3) .value').textContent = `${volumeInWan}万手`;
            
            // 更新数据概览
            document.querySelector('.data-item:nth-child(1) .data-value').textContent = `¥${latestData.open.toFixed(2)}`;
            document.querySelector('.data-item:nth-child(2) .data-value').textContent = `¥${latestData.high.toFixed(2)}`;
            document.querySelector('.data-item:nth-child(3) .data-value').textContent = `¥${latestData.low.toFixed(2)}`;
            document.querySelector('.data-item:nth-child(4) .data-value').textContent = `¥${latestData.close.toFixed(2)}`;
        }
        
        // 初始更新
        updateStockInfo(currentData[currentData.length - 1]);
        
        // 当前显示的系列
        let activeSeries = candleSeries;
        candleSeries.applyOptions({ visible: true });
        lineSeries.applyOptions({ visible: false });
        areaSeries.applyOptions({ visible: false });
        volumeSeries.applyOptions({ visible: true });
        
        // 图表类型切换
        document.getElementById('candleBtn').addEventListener('click', () => {
            setActiveButton('candleBtn');
            candleSeries.applyOptions({ visible: true });
            lineSeries.applyOptions({ visible: false });
            areaSeries.applyOptions({ visible: false });
            activeSeries = candleSeries;
        });
        
        document.getElementById('lineBtn').addEventListener('click', () => {
            setActiveButton('lineBtn');
            candleSeries.applyOptions({ visible: false });
            lineSeries.applyOptions({ visible: true });
            areaSeries.applyOptions({ visible: false });
            activeSeries = lineSeries;
        });
        
        document.getElementById('areaBtn').addEventListener('click', () => {
            setActiveButton('areaBtn');
            candleSeries.applyOptions({ visible: false });
            lineSeries.applyOptions({ visible: false });
            areaSeries.applyOptions({ visible: true });
            activeSeries = areaSeries;
        });
        
        document.getElementById('volumeBtn').addEventListener('click', function() {
            // 用变量记录当前可见性
            if (typeof window.volumeVisible === 'undefined') {
                window.volumeVisible = true;
            }
            window.volumeVisible = !window.volumeVisible;
            volumeSeries.applyOptions({ visible: window.volumeVisible });
            this.classList.toggle('active', window.volumeVisible);
        });
        
        // 时间周期切换
        document.querySelectorAll('.timeframe-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.timeframe-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                const timeframe = this.dataset.timeframe;
                let filteredData;
                
                if (timeframe === '1Y') {
                    // 显示所有数据（1年）
                    filteredData = formattedData;
                } else {
                    // 根据时间周期筛选数据
                    filteredData = filterDataByTimeframe(realStockData, timeframe);
                    filteredData = formatStockData(filteredData);
                }
                
                // 更新所有系列数据
                candleSeries.setData(filteredData.map(d => ({
                    time: d.time,
                    open: d.open,
                    high: d.high,
                    low: d.low,
                    close: d.close,
                })));
                
                lineSeries.setData(filteredData.map(d => ({
                    time: d.time,
                    value: d.close,
                })));
                
                areaSeries.setData(filteredData.map(d => ({
                    time: d.time,
                    value: d.close,
                })));
                
                volumeSeries.setData(filteredData.map(d => ({
                    time: d.time,
                    value: d.volume,
                    color: d.close >= d.open ? 'rgba(0, 255, 136, 0.5)' : 'rgba(255, 85, 85, 0.5)',
                })));
                
                currentData = filteredData;
                updateStockInfo(currentData[currentData.length - 1]);
            });
        });
        
        // 设置活动按钮
        function setActiveButton(buttonId) {
            document.querySelectorAll('.controls button:not(.timeframe-btn)').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(buttonId).classList.add('active');
        }
        
        // 窗口大小调整时重新调整图表大小
        window.addEventListener('resize', () => {
            chart.applyOptions({
                width: document.getElementById('chart').clientWidth,
                height: document.getElementById('chart').clientHeight
            });
        });
        
        // 添加鼠标悬停效果
        chart.subscribeCrosshairMove(param => {
            if (param.time) {
                const data = param.seriesData.get(activeSeries);
                if (data) {
                    // 可以在这里添加悬停提示
                    console.log('悬停数据:', data);
                }
            }
        });
        
        // 初始化完成
        console.log('Lightweight Charts 演示已初始化完成！');
        console.log('使用真实股票数据：厦门钨业 (600549)');
        console.log('数据时间范围：2025年1月至今');
        console.log('数据点数量：', currentData.length);
    </script>
</body>
</html>
